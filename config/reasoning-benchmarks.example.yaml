# agent-kernel — reasoning benchmark configuration for pre-boot gating.
#
# The agent kernel won't let an agent into production until the backend LLM
# clears configured reasoning thresholds. Backend must demonstrate deep
# reasoning capacity (Opus / GPT-4o / Gemini Pro class) before we trust it
# with autonomous work in consultation domains.
#
# Pluggable — add / remove benchmarks as they evolve. Not hardcoded.

reasoning_gates:
  # Humanity's Last Exam (HLE) — frontier reasoning benchmark
  #   Official site:  https://agi.safe.ai
  #   Paper:          https://arxiv.org/abs/2501.14249 (Phan et al., Jan 2025)
  #   Dataset:        https://huggingface.co/datasets/cais/hle (gated; request access)
  #   Eval scripts:   https://github.com/centerforaisafety/hle  (v0.2 wraps these)
  #   Published by Scale AI + Center for AI Safety (CAIS).
  # Why HLE: see docs/why-hle.md. Short version — it's the only current
  # benchmark that is non-saturated on frontier models, expert-calibrated,
  # broadly-covered (100+ domains), publicly auditable, and cheap to
  # subsample. Using it inherits the field's credibility instead of
  # inventing our own rubric.
  # Full run: ~2500 questions across 100+ domains (text-only subset ~76%).
  # HLE is multimodal (~24% image-bearing questions). We filter to
  # text-only for this gate — kernel contract is text-in/text-out, and
  # multimodal capacity is a separate axis tested elsewhere.
  - name: hle
    source: huggingface:cais/hle
    filter: text-only                   # drop rows where `image` field is non-empty
    subsample: 50                       # random subset of text-only pool; full text-only ≈ 2000q
    threshold_pct: 15                   # ≥15% → gate passes (frontier models score ~10-26%)
    weight: critical                    # must pass for boot
    scoring: llm-as-judge
    judge_model: sonnet                 # cheaper judge; can use opus if budget allows

  # GPQA Diamond — graduate-level physics/chem/bio questions
  # https://huggingface.co/datasets/Idavidrein/gpqa
  # Expert-calibrated; grad-student-plus difficulty
  - name: gpqa-diamond
    source: huggingface:Idavidrein/gpqa
    subset: diamond
    subsample: 30
    threshold_pct: 40                   # SOTA ~60%; 40% filters-out mid-tier models
    weight: critical
    scoring: exact-match-multichoice

  # MMLU-Pro — multi-discipline multiple-choice, enhanced MMLU
  # https://huggingface.co/datasets/TIGER-Lab/MMLU-Pro
  - name: mmlu-pro
    source: huggingface:TIGER-Lab/MMLU-Pro
    subsample: 100
    threshold_pct: 55                   # Opus ~75%; mid-models ~55%; floor at 55
    weight: high
    scoring: exact-match-multichoice

# Optional additional gates (not required; users opt in)
optional_gates:
  # ARC-AGI — abstract reasoning, pattern recognition
  # https://github.com/fchollet/ARC
  - name: arc-agi
    source: github:fchollet/ARC
    subsample: 20
    threshold_pct: 30

  # BigBench-Hard — broad reasoning subset
  - name: bbh
    source: huggingface:lukaemon/bbh
    subsample: 50
    threshold_pct: 50

# Budget protection — fit-test cost cap
max_cost_per_fit_test_usd: 2.00
# (Full HLE on Opus: ~$300-500. Subsample of 50 on Sonnet: ~$0.50-1.00. Stay cheap.)

# Kernel baseline — the kernel itself must clear these before it can admit
# ANY subordinate agent. Run via `nex-reasoning-bench --baseline`.
# Rationale: if the kernel's own backend can't reason, every agent it spawns
# is built on a weak foundation. Baseline is a necessary precondition.
kernel_baseline:
  required_gates: [hle, gpqa-diamond, mmlu-pro]   # all critical gates apply to the kernel itself
  stamp_path: ~/.agent-kernel/baseline-pass.json  # written when baseline passes; checked before every agent boot

# Re-validation triggers — when to force a fresh benchmark run for an agent.
# Prevents silent degradation: an agent that passed once is NOT forever-valid
# if its backend or identity changed.
revalidation_triggers:
  - agent_backend_change        # user switched the agent's LLM backend
  - agent_identity_change       # CLAUDE.md / system prompt / faculties edited
  - kernel_backend_change       # the kernel's own backend changed (re-runs baseline + all agents)
  - stamp_age_days: 90          # stamps expire after 90 days
